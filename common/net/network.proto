syntax = "proto3";

package exclave.core.common.net;
option csharp_namespace = "Exclave.Core.Common.Net";
option go_package = "github.com/exclavenetwork/exclave-core/v5/common/net";
option java_package = "com.github.exclavenetwork.exclave.core.common.net";
option java_multiple_files = true;

enum Network {
  Unknown = 0;

  reserved 1;
  TCP = 2;
  UDP = 3;
  UNIX = 4;
}

// NetworkList is a list of Networks.
message NetworkList { repeated Network network = 1; }
