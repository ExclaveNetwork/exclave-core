syntax = "proto3";

package exclave.core.common.protocol;
option csharp_namespace = "Exclave.Core.Common.Protocol";
option go_package = "github.com/exclavenetwork/exclave-core/v5/common/protocol";
option java_package = "com.github.exclavenetwork.exclave.core.common.protocol";
option java_multiple_files = true;

import "common/net/address.proto";
import "common/protocol/user.proto";

message ServerEndpoint {
  exclave.core.common.net.IPOrDomain address = 1;
  uint32 port = 2;
  repeated exclave.core.common.protocol.User user = 3;
}
