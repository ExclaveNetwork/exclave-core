syntax = "proto3";

package exclave.core.common.taggedfeatures;
option csharp_namespace = "Exclave.Core.Common.Taggedfeatures";
option go_package = "github.com/exclavenetwork/exclave-core/v5/common/taggedfeatures";
option java_package = "com.github.exclavenetwork.exclave.core.common.taggedfeatures";
option java_multiple_files = true;

import "google/protobuf/any.proto";

message Config {
  map<string, google.protobuf.Any> features = 1;
}