syntax = "proto3";

package exclave.core.common.log;
option csharp_namespace = "Exclave.Core.Common.Log";
option go_package = "github.com/exclavenetwork/exclave-core/v5/common/log";
option java_package = "com.github.exclavenetwork.exclave.core.common.log";
option java_multiple_files = true;

enum Severity {
  Unknown = 0;
  Error = 1;
  Warning = 2;
  Info = 3;
  Debug = 4;
}
