syntax = "proto3";

package exclave.core.common.protoext.testing;
option csharp_namespace = "Exclave.Core.Common.ProtoExt.Testing";
option go_package = "github.com/exclavenetwork/exclave-core/common/protoext/testing";
option java_package = "com.github.exclavenetwork.exclave.core.common.protoext.testing";
option java_multiple_files = true;

import "common/protoext/extensions.proto";

message TestingMessage{
  option (exclave.core.common.protoext.message_opt).type = "demo";
  option (exclave.core.common.protoext.message_opt).type = "demo2";

  string test_field = 1
  [(exclave.core.common.protoext.field_opt).allowed_values = "test",
    (exclave.core.common.protoext.field_opt).allowed_values = "test2"];
}