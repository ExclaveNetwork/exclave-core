syntax = "proto3";

package exclave.core.proxy.blackhole;
option csharp_namespace = "Exclave.Core.Proxy.Blackhole";
option go_package = "github.com/exclavenetwork/exclave-core/v5/proxy/blackhole";
option java_package = "com.github.exclavenetwork.exclave.core.proxy.blackhole";
option java_multiple_files = true;

import "google/protobuf/any.proto";
import "common/protoext/extensions.proto";

message NoneResponse {}

message HTTPResponse {}

message Config {
  google.protobuf.Any response = 1;
}


message SimplifiedConfig {
  option (exclave.core.common.protoext.message_opt).type = "outbound";
  option (exclave.core.common.protoext.message_opt).short_name = "blackhole";
}