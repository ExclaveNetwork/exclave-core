syntax = "proto3";

package exclave.core.proxy.snell;
option csharp_namespace = "Exclave.Core.Proxy.Snell";
option go_package = "github.com/exclavenetwork/exclave-core/v5/proxy/snell";
option java_package = "com.github.exclavenetwork.exclave.core.proxy.snell";
option java_multiple_files = true;

import "common/protoext/extensions.proto";
import "common/net/address.proto";

message ClientConfig {
  option (exclave.core.common.protoext.message_opt).type = "outbound";
  option (exclave.core.common.protoext.message_opt).short_name = "snell";

  exclave.core.common.net.IPOrDomain address = 1;
  uint32 port = 2;
  // Pre-shared key. Empty string is allowed (server may accept it).
  string psk = 3;
  // "none" | "http" | "tls" (exact match; empty defaults to "none")
  string obfs_mode = 4;
  // 4 or 6 only
  uint32 version = 5;
  // connection reuse
  bool reuse = 6;
  // v4-only: optional obfs host (empty uses library defaults)
  string obfs_host = 7;
  // v6-only: "default" | "unshaped" | "unsafe-raw" (exact match; empty defaults to "default")
  string mode = 8;
  // sing-box private extension (userPSK), only compatible with sing-box Snell server.
  string user_psk = 9;
}
