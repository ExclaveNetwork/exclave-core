syntax = "proto3";

package exclave.core.proxy.dokodemo;
option csharp_namespace = "Exclave.Core.Proxy.Dokodemo";
option go_package = "github.com/exclavenetwork/exclave-core/v5/proxy/dokodemo";
option java_package = "com.github.exclavenetwork.exclave.core.proxy.dokodemo";
option java_multiple_files = true;

import "common/net/address.proto";
import "common/net/network.proto";
import "common/protoext/extensions.proto";

message Config {
  exclave.core.common.net.IPOrDomain address = 1;
  uint32 port = 2;

  // List of networks that the Dokodemo accepts.
  // Deprecated. Use networks.
  exclave.core.common.net.NetworkList network_list = 3 [deprecated = true];
  // List of networks that the Dokodemo accepts.
  repeated exclave.core.common.net.Network networks = 7;

  uint32 timeout = 4 [deprecated = true];
  bool follow_redirect = 5;
  uint32 user_level = 6;
}

message SimplifiedConfig {
  option (exclave.core.common.protoext.message_opt).type = "inbound";
  option (exclave.core.common.protoext.message_opt).short_name = "dokodemo-door";

  exclave.core.common.net.IPOrDomain address = 1;
  uint32 port = 2;
  exclave.core.common.net.NetworkList networks = 3;
  bool follow_redirect = 4;
}
