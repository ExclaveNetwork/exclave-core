syntax = "proto3";

package exclave.core.proxy.shadowsocks.simplified;
option csharp_namespace = "Exclave.Core.Proxy.Shadowsocks.Simplified";
option go_package = "github.com/exclavenetwork/exclave-core/v5/proxy/shadowsocks/simplified";
option java_package = "com.github.exclavenetwork.exclave.core.proxy.shadowsocks.simplified";
option java_multiple_files = true;

import "common/protoext/extensions.proto";
import "common/net/address.proto";
import "common/net/network.proto";
import "proxy/shadowsocks/config.proto";

message ServerConfig{
  option (exclave.core.common.protoext.message_opt).type = "inbound";
  option (exclave.core.common.protoext.message_opt).short_name = "shadowsocks";

  CipherTypeWrapper method = 1;
  string password = 2;
  exclave.core.common.net.NetworkList networks = 3;
  reserved 4;
  string plugin = 5;
  string plugin_opts = 6;
  repeated string plugin_args = 7;
  string plugin_working_dir = 8;
}

message ClientConfig {
  option (exclave.core.common.protoext.message_opt).type = "outbound";
  option (exclave.core.common.protoext.message_opt).short_name = "shadowsocks";

  exclave.core.common.net.IPOrDomain address = 1;
  uint32 port = 2;
  CipherTypeWrapper method = 3;
  string password = 4;
  string plugin = 5;
  string plugin_opts = 6;
  repeated string plugin_args = 7;
  string plugin_working_dir = 8;
  bool uot = 9;
  bool experiment_reduced_iv_head_entropy = 90001;
}

message CipherTypeWrapper {
  exclave.core.proxy.shadowsocks.CipherType value = 1;
}