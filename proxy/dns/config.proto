syntax = "proto3";

package exclave.core.proxy.dns;
option csharp_namespace = "Exclave.Core.Proxy.Dns";
option go_package = "github.com/exclavenetwork/exclave-core/v5/proxy/dns";
option java_package = "com.github.exclavenetwork.exclave.core.proxy.dns";
option java_multiple_files = true;

import "common/net/destination.proto";
import "common/protoext/extensions.proto";

message Config {
  // Server is the DNS server address. If specified, this address overrides the
  // original one.
  exclave.core.common.net.Endpoint server = 1;
  uint32 user_level = 2;
  bool override_response_ttl = 4;
  uint32 response_ttl = 3;
  string non_IP_query = 5;
  bool lookup_as_exchange = 99;
}

message SimplifiedConfig {
  option (exclave.core.common.protoext.message_opt).type = "outbound";
  option (exclave.core.common.protoext.message_opt).short_name = "dns";

  bool override_response_ttl = 4;
  uint32 response_ttl = 3;
  bool lookup_as_exchange = 99;
}
