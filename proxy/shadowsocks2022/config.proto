syntax = "proto3";

package exclave.core.proxy.shadowsocks2022;
option csharp_namespace = "Exclave.Core.Proxy.Shadowsocks2022";
option go_package = "github.com/exclavenetwork/exclave-core/v5/proxy/shadowsocks2022";
option java_package = "com.github.exclavenetwork.exclave.core.proxy.shadowsocks2022";
option java_multiple_files = true;

import "common/net/address.proto";
import "common/protoext/extensions.proto";

message ClientConfig {
  option (exclave.core.common.protoext.message_opt).type = "outbound";
  option (exclave.core.common.protoext.message_opt).short_name = "shadowsocks2022";

  string method = 1;
  bytes psk = 2;
  repeated bytes ipsk = 4;

  exclave.core.common.net.IPOrDomain address = 5;
  uint32 port = 6;
  string plugin = 7;
  string plugin_opts = 8;
  repeated string plugin_args = 9;
  string plugin_working_dir = 10;
  bool uot = 11;
}
