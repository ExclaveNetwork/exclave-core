syntax = "proto3";

package exclave.core.proxy.ipc;
option csharp_namespace = "Exclave.Core.Proxy.IPC";
option go_package = "github.com/exclavenetwork/exclave-core/v5/proxy/ipc";
option java_package = "com.github.exclavenetwork.exclave.core.proxy.ipc";
option java_multiple_files = true;

import "common/protoext/extensions.proto";

message ServerConfig {
  option (exclave.core.common.protoext.message_opt).type = "inbound";
  option (exclave.core.common.protoext.message_opt).short_name = "ipc";
  int32 level = 1;
}
