syntax = "proto3";

package exclave.core.proxy.trojan;
option csharp_namespace = "Exclave.Core.Proxy.Trojan";
option go_package = "github.com/exclavenetwork/exclave-core/v5/proxy/trojan";
option java_package = "com.github.exclavenetwork.exclave.core.proxy.trojan";
option java_multiple_files = true;

import "common/protocol/user.proto";
import "common/protocol/server_spec.proto";
import "common/net/packetaddr/config.proto";

message Account {
  string password = 1;
}

message Fallback {
  string alpn = 1;
  string path = 2;
  string type = 3;
  string dest = 4;
  uint64 xver = 5;
  string name = 6;
}

message ClientConfig {
  repeated exclave.core.common.protocol.ServerEndpoint server = 1;
}

message ServerConfig {
  repeated exclave.core.common.protocol.User users = 1;
  repeated Fallback fallbacks = 3;
  exclave.core.net.packetaddr.PacketAddrType packet_encoding = 4;
}
