syntax = "proto3";

package exclave.core.proxy.trojan.simplified;
option csharp_namespace = "Exclave.Core.Proxy.Trojan.Simplified";
option go_package = "github.com/exclavenetwork/exclave-core/v5/proxy/trojan/simplified";
option java_package = "com.github.exclavenetwork.exclave.core.proxy.trojan.simplified";
option java_multiple_files = true;

import "common/protoext/extensions.proto";
import "common/net/address.proto";
import "common/net/packetaddr/config.proto";

message ServerConfig{
  option (exclave.core.common.protoext.message_opt).type = "inbound";
  option (exclave.core.common.protoext.message_opt).short_name = "trojan";

  repeated string users = 1;
  exclave.core.net.packetaddr.PacketAddrType packet_encoding = 2;
}

message ClientConfig {
  option (exclave.core.common.protoext.message_opt).type = "outbound";
  option (exclave.core.common.protoext.message_opt).short_name = "trojan";

  exclave.core.common.net.IPOrDomain address = 1;
  uint32 port = 2;
  string password = 3;
}