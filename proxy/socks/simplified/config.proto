syntax = "proto3";

package exclave.core.proxy.socks.simplified;
option csharp_namespace = "Exclave.Core.Proxy.Socks.Simplified";
option go_package = "github.com/exclavenetwork/exclave-core/v5/proxy/socks/simplified";
option java_package = "com.github.exclavenetwork.exclave.core.proxy.socks.simplified";
option java_multiple_files = true;

import "common/protoext/extensions.proto";
import "common/net/address.proto";
import "common/net/packetaddr/config.proto";

message ServerConfig{
  option (exclave.core.common.protoext.message_opt).type = "inbound";
  option (exclave.core.common.protoext.message_opt).short_name = "socks";

  exclave.core.common.net.IPOrDomain address = 3;
  bool udp_enabled = 4;
  exclave.core.net.packetaddr.PacketAddrType packet_encoding = 7;
  bool defer_last_reply = 8;
}

message ClientConfig {
  option (exclave.core.common.protoext.message_opt).type = "outbound";
  option (exclave.core.common.protoext.message_opt).short_name = "socks";

  exclave.core.common.net.IPOrDomain address = 1;
  uint32 port = 2;
  bool uot = 3;
}