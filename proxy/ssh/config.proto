syntax = "proto3";

package exclave.core.proxy.ssh;
option csharp_namespace = "Exclave.Core.Proxy.SSH";
option go_package = "github.com/exclavenetwork/exclave-core/v5/proxy/ssh";
option java_package = "com.github.exclavenetwork.exclave.core.proxy.ssh";
option java_multiple_files = true;

import "common/protoext/extensions.proto";
import "common/net/address.proto";

message Config {
  option (exclave.core.common.protoext.message_opt).type = "outbound";
  option (exclave.core.common.protoext.message_opt).short_name = "ssh";

  exclave.core.common.net.IPOrDomain address = 1;
  uint32 port = 2;
  string user = 3;
  optional string password = 4;
  string private_key = 5;
  optional string private_key_passphrase = 6;
  string public_key = 7;
  repeated string host_key_algorithms = 8;
  string client_version = 9;
  uint32 user_level = 10;
  uint32 keepalive_interval = 11;
}
