syntax = "proto3";

package exclave.core.proxy.juicity;
option csharp_namespace = "Exclave.Core.Proxy.Juicity";
option go_package = "github.com/exclavenetwork/exclave-core/v5/proxy/juicity";
option java_package = "com.github.exclavenetwork.exclave.core.proxy.juicity";
option java_multiple_files = true;

import "common/protoext/extensions.proto";
import "common/net/address.proto";

message ClientConfig {
  option (exclave.core.common.protoext.message_opt).type = "outbound";
  option (exclave.core.common.protoext.message_opt).short_name = "juicity";

  exclave.core.common.net.IPOrDomain address = 1;
  uint32 port = 2;
  string uuid = 3;
  string password = 4;
}
