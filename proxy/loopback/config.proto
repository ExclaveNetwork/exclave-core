syntax = "proto3";

package exclave.core.proxy.loopback;
option csharp_namespace = "Exclave.Core.Proxy.Loopback";
option go_package = "github.com/exclavenetwork/exclave-core/v5/proxy/loopback";
option java_package = "com.github.exclavenetwork.exclave.core.proxy.loopback";
option java_multiple_files = true;

import "common/protoext/extensions.proto";

message Config {
  option (exclave.core.common.protoext.message_opt).type = "outbound";
  option (exclave.core.common.protoext.message_opt).short_name = "loopback";

  string inbound_tag = 1;
}
