syntax = "proto3";

package exclave.core.proxy.mixed.simplified;
option csharp_namespace = "Exclave.Core.Proxy.Mixed.Simplified";
option go_package = "github.com/exclavenetwork/exclave-core/v5/proxy/mixed/simplified";
option java_package = "com.github.exclavenetwork.exclave.core.proxy.mixed.simplified";
option java_multiple_files = true;

import "common/protoext/extensions.proto";
import "common/net/address.proto";
import "common/net/packetaddr/config.proto";

message ServerConfig{
  option (exclave.core.common.protoext.message_opt).type = "inbound";
  option (exclave.core.common.protoext.message_opt).short_name = "mixed";

  exclave.core.common.net.IPOrDomain address = 3;
  bool udp_enabled = 4;
  exclave.core.net.packetaddr.PacketAddrType packet_encoding = 7;
}
