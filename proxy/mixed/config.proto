syntax = "proto3";

package exclave.core.proxy.mixed;
option csharp_namespace = "Exclave.Core.Proxy.Mixed";
option go_package = "github.com/exclavenetwork/exclave-core/v5/proxy/mixed";
option java_package = "com.github.exclavenetwork.exclave.core.proxy.mixed";
option java_multiple_files = true;

import "common/net/address.proto";

// Account represents a Socks/HTTP account.
message Account {
  string username = 1;
  string password = 2;
}

// AuthType is the authentication type of Socks proxy.
enum AuthType {
  // NO_AUTH is for anonymous authentication.
  NO_AUTH = 0;
  // PASSWORD is for username/password authentication.
  PASSWORD = 1;
}

// ServerConfig is the protobuf config for Mixed server.
message ServerConfig {
  AuthType auth_type = 1 [deprecated = true];
  map<string, string> accounts = 2;
  uint32 timeout = 3 [deprecated = true];
  uint32 user_level = 4;
  // Socks
  bool udp_enabled = 5;
  exclave.core.common.net.IPOrDomain address = 6;
  reserved 7;
  bool defer_last_reply = 8;
  // HTTP
  bool allow_transparent = 9;
}
