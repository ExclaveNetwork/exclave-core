syntax = "proto3";

package exclave.core.proxy.shadowtls;
option csharp_namespace = "Exclave.Core.Proxy.ShadowTLS";
option go_package = "github.com/exclavenetwork/exclave-core/v5/proxy/shadowtls";
option java_package = "com.github.exclavenetwork.exclave.core.proxy.shadowtls";
option java_multiple_files = true;

import "common/protoext/extensions.proto";
import "common/net/address.proto";

message ClientConfig {
  option (exclave.core.common.protoext.message_opt).type = "outbound";
  option (exclave.core.common.protoext.message_opt).short_name = "shadowtls";

  exclave.core.common.net.IPOrDomain address = 1;
  uint32 port = 2;
  string password = 3;
  uint32 version = 4;
}
