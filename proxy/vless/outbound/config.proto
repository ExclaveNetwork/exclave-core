syntax = "proto3";

package exclave.core.proxy.vless.outbound;
option csharp_namespace = "Exclave.Core.Proxy.Vless.Outbound";
option go_package = "github.com/exclavenetwork/exclave-core/v5/proxy/vless/outbound";
option java_package = "com.github.exclavenetwork.exclave.core.proxy.vless.outbound";
option java_multiple_files = true;

import "common/protocol/server_spec.proto";
import "common/net/address.proto";
import "common/protoext/extensions.proto";
import "common/net/packetaddr/config.proto";

message Config {
  repeated exclave.core.common.protocol.ServerEndpoint vnext = 1;
  exclave.core.net.packetaddr.PacketAddrType packet_encoding = 2;
}

message SimplifiedConfig {
  option (exclave.core.common.protoext.message_opt).type = "outbound";
  option (exclave.core.common.protoext.message_opt).short_name = "vless";

  exclave.core.common.net.IPOrDomain address = 1;
  uint32 port = 2;
  string uuid = 3;
  exclave.core.net.packetaddr.PacketAddrType packet_encoding = 4;
  string encryption = 5;
}