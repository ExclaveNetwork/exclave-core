syntax = "proto3";

package exclave.core.proxy.vless.inbound;
option csharp_namespace = "Exclave.Core.Proxy.Vless.Inbound";
option go_package = "github.com/exclavenetwork/exclave-core/v5/proxy/vless/inbound";
option java_package = "com.github.exclavenetwork.exclave.core.proxy.vless.inbound";
option java_multiple_files = true;

import "common/protocol/user.proto";
import "common/protoext/extensions.proto";

message Fallback {
  string alpn = 1;
  string path = 2;
  string type = 3;
  string dest = 4;
  uint64 xver = 5;
  string name = 6;
}

message Config {
  repeated exclave.core.common.protocol.User clients = 1;
  // Decryption settings. Only applies to server side.
  string decryption = 2;
  repeated Fallback fallbacks = 3;
}

message SimplifiedConfig {
  option (exclave.core.common.protoext.message_opt).type = "inbound";
  option (exclave.core.common.protoext.message_opt).short_name = "vless";

  repeated string users = 1;
  string decryption = 2;
}
