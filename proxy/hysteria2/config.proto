syntax = "proto3";

package exclave.core.proxy.hysteria2;
option csharp_namespace = "Exclave.Core.Proxy.Hysteria2";
option go_package = "github.com/exclavenetwork/exclave-core/v5/proxy/hysteria2";
option java_package = "com.github.exclavenetwork.exclave.core.proxy.hysteria2";
option java_multiple_files = true;

import "common/protocol/server_spec.proto";
import "common/protoext/extensions.proto";

message Account {
}

message ClientConfig {
  option (exclave.core.common.protoext.message_opt).type = "outbound";
  option (exclave.core.common.protoext.message_opt).short_name = "hysteria2";

  repeated exclave.core.common.protocol.ServerEndpoint server = 1;
}

message ServerConfig {
  option (exclave.core.common.protoext.message_opt).type = "inbound";
  option (exclave.core.common.protoext.message_opt).short_name = "hysteria2";

  reserved 1;
}
