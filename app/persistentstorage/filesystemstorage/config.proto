syntax = "proto3";

package exclave.core.app.persistentstorage.filesystemstorage;
option csharp_namespace = "Exclave.Core.App.Persistentstorage.Filesystemstorage";
option go_package = "github.com/exclavenetwork/exclave-core/v5/app/persistentstorage/filesystemstorage";
option java_package = "com.github.exclavenetwork.exclave.core.persistentstorage.filesystemstorage";
option java_multiple_files = true;

import "common/protoext/extensions.proto";

enum StateStorageRoot {
  WorkDir = 0;
}

message Config {
  option (exclave.core.common.protoext.message_opt).type = "service";
  option (exclave.core.common.protoext.message_opt).short_name = "filesystemstorage";

  StateStorageRoot state_storage_root = 1;
  string instance_name = 4;

  bool protojson = 5;
}
