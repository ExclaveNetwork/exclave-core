syntax = "proto3";

package exclave.core.app.browserforwarder;

option csharp_namespace = "Exclave.Core.App.Browserforwarder";
option go_package = "github.com/exclavenetwork/exclave-core/v5/app/browserforwarder";
option java_package = "com.github.exclavenetwork.exclave.core.app.browserforwarder";
option java_multiple_files = true;

import "common/protoext/extensions.proto";

// Config is the settings for BrowserForwarder.
message Config {
  option (exclave.core.common.protoext.message_opt).type = "service";
  option (exclave.core.common.protoext.message_opt).short_name = "browser";

  string listen_addr = 1;
  int32 listen_port = 2;
}