syntax = "proto3";

package exclave.core.app.stats;
option csharp_namespace = "Exclave.Core.App.Stats";
option go_package = "github.com/exclavenetwork/exclave-core/v5/app/stats";
option java_package = "com.github.exclavenetwork.exclave.core.app.stats";
option java_multiple_files = true;

import "common/protoext/extensions.proto";

message Config {
  option (exclave.core.common.protoext.message_opt).type = "service";
  option (exclave.core.common.protoext.message_opt).short_name = "stats";
}

message ChannelConfig {
  bool Blocking = 1;
  int32 SubscriberLimit = 2;
  int32 BufferSize = 3;
}
