syntax = "proto3";

package exclave.core.app.observatory.command;
option csharp_namespace = "Exclave.Core.App.Observatory.Command";
option go_package = "github.com/exclavenetwork/exclave-core/v5/app/observatory/command";
option java_package = "com.github.exclavenetwork.exclave.core.app.observatory.command";
option java_multiple_files = true;

import "common/protoext/extensions.proto";
import "app/observatory/config.proto";

message GetOutboundStatusRequest {
  string Tag = 1;
}

message GetOutboundStatusResponse {
  exclave.core.app.observatory.ObservationResult status = 1;
}

service ObservatoryService {
  rpc GetOutboundStatus(GetOutboundStatusRequest)
      returns (GetOutboundStatusResponse) {}
}


message Config {
  option (exclave.core.common.protoext.message_opt).type = "grpcservice";
  option (exclave.core.common.protoext.message_opt).short_name = "observatory";
}