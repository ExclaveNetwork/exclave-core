syntax = "proto3";

package exclave.core.app.browserdialer;

option csharp_namespace = "Exclave.Core.App.Browserdialer";
option go_package = "github.com/exclavenetwork/exclave-core/v5/app/browserdialer";
option java_package = "com.github.exclavenetwork.exclave.core.app.browserdialer";
option java_multiple_files = true;

import "common/protoext/extensions.proto";

message Config {
  option (exclave.core.common.protoext.message_opt).type = "service";
  option (exclave.core.common.protoext.message_opt).short_name = "browserdialer";

  string listen_addr = 1;
  int32 listen_port = 2;
}