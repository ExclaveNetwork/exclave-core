syntax = "proto3";

package exclave.core.app.dispatcher;
option csharp_namespace = "Exclave.Core.App.Dispatcher";
option go_package = "github.com/exclavenetwork/exclave-core/v5/app/dispatcher";
option java_package = "com.github.exclavenetwork.exclave.core.app.dispatcher";
option java_multiple_files = true;

message SessionConfig {
