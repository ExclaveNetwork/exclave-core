syntax = "proto3";

package exclave.core.transport.internet.tls.utls;
option csharp_namespace = "Exclave.Core.Transport.Internet.Tls.UTls";
option go_package = "github.com/exclavenetwork/exclave-core/v5/transport/internet/tls/utls";
option java_package = "com.github.exclavenetwork.exclave.core.transport.internet.tls.utls";
option java_multiple_files = true;

import "common/protoext/extensions.proto";
import "transport/internet/tls/config.proto";

enum ForcedALPN{
  TRANSPORT_PREFERENCE_TAKE_PRIORITY = 0;
  NO_ALPN = 1;
  UTLS_PRESET = 2;
}

message Config {
  option (exclave.core.common.protoext.message_opt).type = "security";
  option (exclave.core.common.protoext.message_opt).short_name = "utls";

  exclave.core.transport.internet.tls.Config tls_config = 1;
  string imitate = 2;
  bool noSNI = 3;
  ForcedALPN force_alpn = 4;
}