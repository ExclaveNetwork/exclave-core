syntax = "proto3";

package exclave.core.transport.internet.http;
option csharp_namespace = "Exclave.Core.Transport.Internet.Http";
option go_package = "github.com/exclavenetwork/exclave-core/v5/transport/internet/http";
option java_package = "com.github.exclavenetwork.exclave.core.transport.internet.http";
option java_multiple_files = true;

import "common/protoext/extensions.proto";

import "transport/internet/headers/http/config.proto";

message Config {
  option (exclave.core.common.protoext.message_opt).type = "transport";
  option (exclave.core.common.protoext.message_opt).short_name = "h2";

  option (exclave.core.common.protoext.message_opt).transport_original_name = "http";
  repeated string host = 1;
  string path = 2;
  string method = 3;
  repeated exclave.core.transport.internet.headers.http.Header header = 4;
  bool parse_x_forwarded_for = 5;
}
