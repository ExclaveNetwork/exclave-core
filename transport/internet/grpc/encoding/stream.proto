syntax = "proto3";

package exclave.core.transport.internet.grpc.encoding;
option csharp_namespace = "Exclave.Core.Transport.Internet.Grpc.Encoding";
option go_package = "github.com/exclavenetwork/exclave-core/v5/transport/internet/grpc/encoding";
option java_package = "com.github.exclavenetwork.exclave.core.transport.internet.grpc.encoding";
option java_multiple_files = true;

message Hunk {
  bytes data = 1;
}

message MultiHunk {
   repeated bytes data = 1;
}

service GunService {
  rpc Tun (stream Hunk) returns (stream Hunk);
}

service GunMultiService {
  rpc Tun (stream MultiHunk) returns (stream MultiHunk);
}
