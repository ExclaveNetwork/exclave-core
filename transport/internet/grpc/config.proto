syntax = "proto3";

package exclave.core.transport.internet.grpc.encoding;
option csharp_namespace = "Exclave.Core.Transport.Internet.Grpc";
option go_package = "github.com/exclavenetwork/exclave-core/v5/transport/internet/grpc";
option java_package = "com.github.exclavenetwork.exclave.core.transport.internet.grpc";
option java_multiple_files = true;

import "common/protoext/extensions.proto";

message Config {
  option (exclave.core.common.protoext.message_opt).type = "transport";
  option (exclave.core.common.protoext.message_opt).short_name = "grpc";

  option (exclave.core.common.protoext.message_opt).transport_original_name = "gun";

  string host = 1;
  string service_name = 2;
  int32 idle_timeout = 3;
  int32 health_check_timeout = 4;
  bool permit_without_stream = 5;
  int32 initial_windows_size = 6;
  bool parse_x_forwarded_for = 7;

  bool multi_mode = 98;
  bool service_name_compat = 99;
}