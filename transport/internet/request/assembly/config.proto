syntax = "proto3";

package exclave.core.transport.internet.request.assembly;
option csharp_namespace = "Exclave.Core.Transport.Internet.Request.Assembly";
option go_package = "github.com/exclavenetwork/exclave-core/v5/transport/internet/request/assembly";
option java_package = "com.github.exclavenetwork.exclave.core.transport.internet.request.assembly";
option java_multiple_files = true;

import "common/protoext/extensions.proto";
import "google/protobuf/any.proto";

message Config {
  option (exclave.core.common.protoext.message_opt).type = "transport";
  option (exclave.core.common.protoext.message_opt).short_name = "request";

  google.protobuf.Any assembler = 1;
  google.protobuf.Any roundtripper = 2;
}