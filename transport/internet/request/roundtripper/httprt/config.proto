syntax = "proto3";

package exclave.core.transport.internet.request.roundtripper.httprt;
option csharp_namespace = "Exclave.Core.Transport.Internet.Request.Roundtripper.httprt";
option go_package = "github.com/exclavenetwork/exclave-core/v5/transport/internet/request/roundtripper/httprt";
option java_package = "com.github.exclavenetwork.exclave.core.transport.internet.request.roundtripper.httprt";
option java_multiple_files = true;

import "common/protoext/extensions.proto";

message ClientConfig {
  option (exclave.core.common.protoext.message_opt).type = "transport.request.roundtripper.client";
  option (exclave.core.common.protoext.message_opt).short_name = "httprt";

  HTTPConfig http = 1;
  bool allow_http = 2;
  int32 h2_pool_size = 3;
}

message ServerConfig {
  option (exclave.core.common.protoext.message_opt).type = "transport.request.roundtripper.server";
  option (exclave.core.common.protoext.message_opt).short_name = "httprt";
  HTTPConfig http = 1;
  bool no_decoding_session_tag = 2;
}

message HTTPConfig {
  string path = 1;
  string urlPrefix = 2;
}