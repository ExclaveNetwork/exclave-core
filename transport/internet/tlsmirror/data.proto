syntax = "proto3";

package exclave.core.transport.internet.tlsmirror;
option csharp_namespace = "Exclave.Core.Transport.Internet.Tlsmirror";
option go_package = "github.com/exclavenetwork/exclave-core/v5/transport/internet/tlsmirror";
option java_package = "com.github.exclavenetwork.exclave.core.transport.internet.tlsmirror";
option java_multiple_files = true;


message EnrollmentConfirmationReq{
  bytes server_identifier = 1;
  bytes carrier_tls_connection_client_random = 2;
  bytes carrier_tls_connection_server_random = 3;
  bytes client_identifier = 4; // Implicated
  bytes reply_address_tag = 5;
}
message EnrollmentConfirmationResp{
  bool enrolled = 1;
}