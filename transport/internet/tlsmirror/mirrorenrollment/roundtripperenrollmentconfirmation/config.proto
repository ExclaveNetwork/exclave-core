syntax = "proto3";

package exclave.core.transport.internet.tlsmirror.mirrorenrollment.roundtripperenrollmentconfirmation;
option csharp_namespace = "Exclave.Core.Transport.Internet.Tlsmirror.MirrorEnrollment.RoundTripperEnrollmentConfirmation";
option go_package = "github.com/exclavenetwork/exclave-core/v5/transport/internet/tlsmirror/mirrorenrollment/roundtripperenrollmentconfirmation";
option java_package = "com.github.exclavenetwork.exclave.core.transport.internet.tlsmirror.mirrorenrollment.roundtripperenrollmentconfirmation";
option java_multiple_files = true;

import "google/protobuf/any.proto";

message ClientConfig {
  google.protobuf.Any round_tripper_client = 1;
  google.protobuf.Any security_config = 2;
  string dest = 3;
  string outbound_tag = 4;
  bytes server_identity = 5;
}

message ServerInverseRoleConfig {
  google.protobuf.Any round_tripper_client = 1;
  google.protobuf.Any security_config = 2;
  string dest = 3;
  string outbound_tag = 4;
  bytes server_identity = 5;
}

message ServerConfig {
  google.protobuf.Any round_tripper_server = 2;
  string listen = 3;
}